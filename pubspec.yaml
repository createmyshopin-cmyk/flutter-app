name: flutter_voice_calling_app_2026
description: A coin-based voice calling Flutter app.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.1.0
  cloud_firestore: ^5.0.1
  provider: ^6.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.4
  flutter_ringtone_player: ^4.0.0+4
  razorpay_flutter: ^1.4.5
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  connectivity_plus: ^7.1.1
  internet_connection_checker_plus: ^3.0.1
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
    - assets/illustrations/
